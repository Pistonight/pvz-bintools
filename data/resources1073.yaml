paths:
  input-directory: main1073
  output-xml: main1073_res_test/resources.xml
  output-cpp: xxx
  output-h: xxx
  excludes:
    - glob:compiled/**/*
    - glob:properties/**/*
    - glob:images/reloaded/**/*
    - glob:images/_UNUSED/**/*
    # on-disk casing differs from the original manifest; injected as external below
    - glob:images/ProjectilePea.png
    - glob:images/ProjectileSnowPea.png
    - glob:images/SeedChooser_Background.png
    - glob:images/Shovel.png
    - glob:images/Shovel_hi_res.png
    - glob:images/Store_Car_night.png
    - glob:images/Store_CarClosed_night.png
    - glob:reanim/SelectorScreen_Adventure_highlight.png
    - glob:reanim/SelectorScreen_Challenges_highlight.png
    - glob:reanim/SelectorScreen_Survival_highlight.png
    - glob:particles/ZombieBobsledHead.png
    # specific excludes
    - glob:images/zombatar_navy_rect.png
    - glob:images/zombatar_next_button_disabled.png
    - glob:images/zombatar_prev_button_disabled.png
    - glob:images/zombatar_stone_tablet.png

codegen:
  include-prefix-sexy: SexyAppFramework
  include-prefix: LawnApp
  namespace: Sexy


resource-groups:
  - name: Init
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: BLANK, path: blank, external: true }
          - path: PopCap_Logo.jpg
      - type: Image
        defaults:
          path: properties
          id-prefix: IMAGE_
        items:
          - { id: PARTNER_LOGO, path: partner_logo, external: true }
  - name: LoaderBar
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - path: titlescreen.jpg
            attrs: 
              a8r8g8b8: true
          - pattern: glob:LoadBar_*.png
          - path: PvZ_Logo.jpg
      - type: Image
        defaults: { path: reanim, id-prefix: IMAGE_REANIM_ }
        items:
          - path: SodRollCap.png
      - type: Font
        defaults: { path: data, id-prefix: FONT_ }
        items:
          - path: BrianneTod16.txt
      - type: Sound
        defaults: { path: sounds, id-prefix: SOUND_ }
        items:
          - path: buttonclick.ogg
          - pattern: glob:loadingbar_*
  - name: LoadingFonts
    contents:
      - type: Font
        defaults: { path: data, id-prefix: FONT_ }
        items:
          - raw: '  <Image id="IMAGE_HOUSEOFTERROR28" path="houseofterror28" />'
          - pattern: regex:^HouseofTerror\d\d\.txt
          - path: Pix118Bold.txt
            id: TINYBOLD
          - path: ContinuumBold14.txt
          - path: ContinuumBold14Outback.txt
            id: CONTINUUMBOLD14OUTLINE
            external: true # we are case-sensitive so it needs to be outback.txt
          - pattern: glob:DwarvenTodcraft*
          - path: Pico129.txt
          - path: BrianneTod12.txt

