          - pattern: glob:Almanac_*
  - name: DelayLoad_Store
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          # All Store_* images. The trailing [^_] excludes the stray Store_Car_/Store_CarClosed_
          # alpha files (Store_SpeechBubble* are already consumed by LoadingImages).
          - pattern: regex:^Store_.*[^_]\.(jpg|png)$
          - { id: STORE_CAR_NIGHT, path: Store_Car_Night, external: true }
          - { id: STORE_CARCLOSED_NIGHT, path: Store_CarClosed_Night, external: true }
  - name: DelayLoad_ZombieNote
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: ZOMBIE_NOTE, path: ZombieNote.jpg }
  - name: DelayLoad_ZombieNote1
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: ZOMBIE_NOTE1, path: ZombieNoteBlack1.png, attrs: { alphagrid: ZombieNote1 } }
  - name: DelayLoad_ZombieNote2
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: ZOMBIE_NOTE2, path: ZombieNoteBlack2.png, attrs: { alphagrid: ZombieNote2 } }
  - name: DelayLoad_ZombieNote3
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: ZOMBIE_NOTE3, path: ZombieNoteBlack3.png, attrs: { alphagrid: ZombieNote3 } }
  - name: DelayLoad_ZombieNote4
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: ZOMBIE_NOTE4, path: ZombieNoteBlack4.png, attrs: { alphagrid: ZombieNote4 } }
  - name: DelayLoad_ZombieFinalNote
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          # The alpha file is on disk as Zombiefinalnote.png (lower case); manifest wants ZombieFinalNote.
          - raw: '  <Image id="ZOMBIE_FINAL_NOTE" path="ZombieFinalNoteBlack" alphagrid="ZombieFinalNote" />'
  - name: DelayLoad_ZombieNoteHelp
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - { id: ZOMBIE_NOTE_HELP, path: ZombieNoteHelpBlack.png, attrs: { alphagrid: ZombieNoteHelp } }

  - name: DelayLoad_Credits
    contents:
      - type: Font
        defaults: { path: data, id-prefix: FONT_ }
        items:
          - pattern: glob:B*
      - type: Image
        defaults: { path: reanim, id-prefix: IMAGE_REANIM_ }
        items:
          - pattern: glob:SunFlower_head_*
          - path: Credits_DiscoLights.png
          - path: Credits_fogmachine.png
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - path: Credits_ZombieNoteBlack.png
            id: CREDITS_ZOMBIENOTE
            attrs:
              alphagrid: Credits_ZombieNote.png
          - path: Credits_PlayButton.png

  - name: DelayLoad_Zombatar
    contents:
      - type: Image
        defaults: { path: images, id-prefix: IMAGE_ }
        items:
          - path: zombatar_fhair_button.png
            id: ZOMBATAR_FACIAL_HAIR_BUTTON
          - path: zombatar_fhair_button_highlight.png
            id: ZOMBATAR_FACIAL_HAIR_BUTTON_HIGHLIGHT
          - path: zombatar_fhair_button_over.png
            id: ZOMBATAR_FACIAL_HAIR_BUTTON_OVER
          - pattern: regex:zombatar_.*[^_]\.png
      
